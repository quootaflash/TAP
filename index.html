<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Karir - WriteHubIndo</title>
    <meta name="description" content="Tautan karir eksklusif WriteHubIndo. Gabung grup WhatsApp dan dukungan karir.">
    
    <!-- Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- VARIABLES --- */
        :root {
            --primary: #0F172A;
            --secondary: #3B82F6;
            --wa-color: #25D366;
            --bg-gradient: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --radius-btn: 50px; /* Rounded pill shape biolink */
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed; /* Fixed background for smooth feel */
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- CONTAINER --- */
        .biolink-container {
            width: 100%;
            max-width: 480px; /* Standard bio link width */
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            padding: 40px 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PROFILE --- */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .avatar:hover { transform: scale(1.05) rotate(3deg); }

        .username {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .bio {
            font-size: 0.9rem;
            color: #64748B;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* --- LINKS (BUTTONS) --- */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 20px;
            background: white;
            color: var(--primary);
            text-decoration: none;
            border-radius: var(--radius-btn);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Interactive Hover State */
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.15);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        /* Left Icon Wrapper */
        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #F1F5F9;
            border-radius: 50%;
            margin-right: 12px;
            font-size: 1rem;
            color: var(--primary);
            transition: 0.3s;
        }

        .link-btn:hover .btn-icon {
            background: var(--secondary);
            color: white;
        }

        /* Right Arrow */
        .btn-arrow {
            font-size: 0.9rem;
            opacity: 0.5;
            transition: 0.3s;
        }

        .link-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* SPECIAL BUTTON: WHATSAPP GROUP */
        .link-btn.primary-wa {
            background: var(--wa-color);
            color: white;
            border: none;
        }
        
        .link-btn.primary-wa .btn-icon {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .link-btn.primary-wa:hover {
            background: #20BA56; /* Darker WA Green */
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4);
            color: white; /* Keep text white */
        }
        
        .link-btn.primary-wa .btn-arrow { color: white; }

        /* --- BACK TO SITE BUTTON --- */
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
            padding: 12px;
            color: #64748B;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 12px;
            transition: 0.3s;
            border: 1px dashed #CBD5E1;
        }

        .back-btn:hover {
            background: white;
            color: var(--secondary);
            border-color: var(--secondary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .back-btn i { margin-right: 8px; }

        /* --- SOCIALS --- */
        .socials {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .social-link:hover {
            transform: translateY(-3px);
            color: var(--secondary);
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.75rem;
            color: #94A3B8;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            body { padding: 0; align-items: flex-start; background: #F8FAFC; }
            .biolink-container {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
                border: none;
                box-shadow: none;
                background: transparent;
                backdrop-filter: none;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="biolink-container">
        
        <!-- PROFILE -->
        <div class="profile-section">
            <img src="https://picsum.photos/seed/whitelogo/200/200" alt="WriteHubIndo" class="avatar" oncontextmenu="return false;">
            <h1 class="username">WriteHubIndo <i class="fa-solid fa-circle-check" style="color: var(--secondary); font-size: 0.9rem;"></i></h1>
            <p class="bio">Partner karir profesional untuk CV, Resume & LinkedIn.</p>
        </div>

        <!-- LINKS -->
        <div class="links-list">
            
            <!-- 1. Utama: Grup WA -->
            <a href="https://chat.whatsapp.com/LINKGRUP" target="_blank" class="link-btn primary-wa">
                <div style="display: flex; align-items: center;">
                    <div class="btn-icon"><i class="fa-brands fa-whatsapp"></i></div>
                    <span>Gabung Grup Karir</span>
                </div>
                <i class="fa-solid fa-arrow-right btn-arrow"></i>
            </a>

            <!-- 2. Konsultasi -->
            <a href="https://wa.me/6281234567890?text=Halo%20saya%20butuh%20bantuan" target="_blank" class="link-btn">
                <div style="display: flex; align-items: center;">
                    <div class="btn-icon"><i class="fa-solid fa-headset"></i></div>
                    <span>Chat Dukungan Karir</span>
                </div>
                <i class="fa-solid fa-arrow-right btn-arrow"></i>
            </a>

            <!-- 3. Jasa CV -->
            <a href="https://writehubindo.com/services" target="_blank" class="link-btn">
                <div style="display: flex; align-items: center;">
                    <div class="btn-icon"><i class="fa-regular fa-file-lines"></i></div>
                    <span>Pesan Jasa CV</span>
                </div>
                <i class="fa-solid fa-arrow-right btn-arrow"></i>
            </a>

            <!-- 4. E-Book -->
            <a href="https://writehubindo.com/ebook" target="_blank" class="link-btn">
                <div style="display: flex; align-items: center;">
                    <div class="btn-icon"><i class="fa-solid fa-book-open"></i></div>
                    <span>Beli E-Book</span>
                </div>
                <i class="fa-solid fa-arrow-right btn-arrow"></i>
            </a>

            <!-- 5. LinkedIn -->
            <a href="https://writehubindo.com/linkedin" target="_blank" class="link-btn">
                <div style="display: flex; align-items: center;">
                    <div class="btn-icon"><i class="fa-brands fa-linkedin-in"></i></div>
                    <span>Optimasi LinkedIn</span>
                </div>
                <i class="fa-solid fa-arrow-right btn-arrow"></i>
            </a>

        </div>

        <!-- BACK TO SITE BUTTON -->
        <a href="https://writehubindo.com" class="back-btn">
            <i class="fa-solid fa-house"></i> Kembali ke Situs Utama
        </a>

        <!-- SOCIALS -->
        <div class="socials">
            <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
        </div>

        <footer>
            &copy; 2023 WriteHubIndo Career Hub
        </footer>

    </div>

    <script>
        // Mencegah klik kanan dan inspect (Proteksi)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }

        // Efek Ripple Sederhana saat klik (Interaktif)
        const buttons = document.querySelectorAll('.link-btn, .back-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Sedikit delay untuk efek visual sebelum pindah halaman (opsional)
                // Ini membuat tombol terasa "ditekan"
                this.style.transform = "scale(0.96)";
                setTimeout(() => {
                    this.style.transform = "";
                }, 150);
            });
        });
    </script>
</body>
</html>
